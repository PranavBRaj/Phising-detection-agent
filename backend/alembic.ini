# A generic, single database configuration.

[alembic]
# Path to migration scripts, relative to this file (i.e. the backend/ directory)
script_location = migrations

# The SQLAlchemy URL is set programmatically in migrations/env.py from .env.
# This placeholder is overridden at runtime — do NOT put real credentials here.
sqlalchemy.url = driver://user:pass@host/dbname

# Timezone for revision timestamps
timezone = UTC

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
